<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AssetSys">
<meta name="theme-color" content="#c00000">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AssetSys — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red-1:#ff2d2d;--red-2:#c00;--red-3:#7a0000;
  --bg:#0a0a0a;--surface:#141414;--surface2:#1e1e1e;--surface3:#252525;
  --text:#f0f0f0;--muted:#666;--border:#2a2a2a;--card-bg:#141414;--input-bg:#1e1e1e;--dot-empty:#2a2a2a;
}
[data-theme="light"]{
  --bg:#f0f0f5;--surface:#fff;--surface2:#f5f5f5;--surface3:#ebebeb;
  --text:#111;--muted:#999;--border:#e0e0e0;--card-bg:#fff;--input-bg:#f5f5f5;--dot-empty:#ddd;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Bai Jamjuree',sans-serif;transition:background .25s,color .25s}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 90% 55% at 50% -5%,rgba(192,0,0,.32) 0%,transparent 65%);pointer-events:none;z-index:0}
[data-theme="light"] body::before{background:radial-gradient(ellipse 90% 55% at 50% -5%,rgba(192,0,0,.1) 0%,transparent 65%)}
.theme-btn{position:fixed;top:14px;right:14px;z-index:200;width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:1.25rem}
.logo{text-align:center;margin-bottom:1.75rem;animation:fadeDown .5s ease both}
.logo-icon{width:72px;height:72px;border-radius:22px;overflow:hidden;margin:0 auto .8rem;box-shadow:0 6px 30px rgba(192,0,0,.4)}
.logo-icon img{width:100%;height:100%;object-fit:cover;display:block}
.logo h1{font-size:1.5rem;font-weight:700;letter-spacing:-.3px}
.logo p{font-size:.7rem;color:var(--muted);margin-top:.2rem;letter-spacing:1px;font-weight:500}
.card{width:100%;max-width:380px;background:var(--card-bg);border:1px solid var(--border);border-radius:18px;padding:1.75rem 1.5rem;animation:fadeUp .5s .08s ease both;transition:background .25s,border-color .25s}
.notice{display:flex;gap:8px;align-items:flex-start;background:rgba(192,0,0,.08);border:1px solid rgba(192,0,0,.2);border-radius:10px;padding:.65rem .9rem;font-size:.75rem;color:#e07070;line-height:1.65;margin-bottom:1.1rem}
[data-theme="light"] .notice{color:#a03030}
.field{margin-bottom:1.1rem}
.field-label{font-size:.7rem;font-weight:600;color:var(--muted);letter-spacing:.6px;margin-bottom:.4rem}
.field-input{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:10px;padding:.72rem 1rem;font-size:.92rem;color:var(--text);font-family:'Bai Jamjuree',sans-serif;outline:none;transition:border-color .2s,background .25s;-webkit-appearance:none}
.field-input:focus{border-color:var(--red-1);box-shadow:0 0 0 3px rgba(255,45,45,.1)}
.field-input::placeholder{color:var(--muted)}
.pin-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.45rem}
.pin-head label{font-size:.7rem;font-weight:600;color:var(--muted);letter-spacing:.6px}
.pin-show{font-size:.7rem;color:var(--red-1);background:none;border:none;font-family:'Bai Jamjuree',sans-serif;cursor:pointer;padding:0;font-weight:500}
.pin-boxes{display:flex;gap:8px;justify-content:center;margin-bottom:1.1rem}
.pin-box{width:46px;height:54px;border-radius:12px;border:1.5px solid var(--border);background:var(--input-bg);color:var(--text);font-size:1.4rem;font-family:'Bai Jamjuree',monospace;font-weight:700;text-align:center;outline:none;caret-color:transparent;transition:border-color .15s,transform .1s;-webkit-appearance:none}
.pin-box:focus{border-color:var(--red-1);box-shadow:0 0 0 3px rgba(255,45,45,.1);transform:scale(1.05)}
.pin-box.filled{border-color:var(--red-1)}
.pin-box.shake{animation:shake .35s ease}
.divider{display:flex;align-items:center;gap:10px;margin:.85rem 0;color:var(--muted);font-size:.72rem;font-weight:500}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.line-btn{width:100%;padding:.78rem;border-radius:12px;border:none;background:#06C755;color:#fff;font-size:.9rem;font-weight:700;font-family:'Bai Jamjuree',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;transition:opacity .2s}
.line-btn svg{width:22px;height:22px;flex-shrink:0}
.line-wrap{display:none}
.line-wrap.show{display:block}
.btn-login{width:100%;padding:.85rem;margin-top:.75rem;background:linear-gradient(135deg,var(--red-1),var(--red-2));border:none;border-radius:12px;color:#fff;font-size:.95rem;font-weight:700;font-family:'Bai Jamjuree',sans-serif;cursor:pointer;transition:opacity .2s,transform .1s;letter-spacing:.3px}
.btn-login:active{transform:scale(.98)}
.btn-login:disabled{opacity:.35;pointer-events:none}
.err-msg{display:none;text-align:center;font-size:.78rem;color:#f87171;margin-top:.65rem;padding:.5rem .75rem;background:rgba(248,113,113,.08);border-radius:8px}
.err-msg.show{display:block;animation:fadeIn .3s ease}
.spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
.footer{margin-top:1.25rem;font-size:.67rem;color:var(--muted);text-align:center;font-weight:500}
@keyframes fadeDown{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:none}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-7px)}40%,80%{transform:translateX(7px)}}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<button class="theme-btn" id="theme-btn"></button>
<div class="wrap">
  <div class="logo">
    <div class="logo-icon"><img src="https://i.ibb.co/xSpNYB3j/technology.png" alt="AssetSys"></div>
    <h1>AssetSys</h1>
    <p>PC UPGRADE TRACKING SYSTEM</p>
  </div>
  <div class="card">
    <div class="notice">
      <span>💡</span>
      <span><strong>เข้าใช้งานครั้งแรก?</strong><br>ใช้ <strong>รหัสพนักงาน</strong> เป็น PIN แรก ระบบจะบังคับเปลี่ยน PIN ทันที</span>
    </div>
    <div class="field">
      <div class="field-label">รหัสพนักงาน</div>
      <input class="field-input" type="text" id="emp-id" placeholder="เช่น admin001" autocomplete="username" spellcheck="false" id="username">
    </div>
    <div class="pin-head">
      <label>PIN 6 หลัก</label>
      <button class="pin-show" id="pin-show">แสดง</button>
    </div>
    <div class="pin-boxes" id="pin-boxes">
      <input class="pin-box" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code" data-i="0">
      <input class="pin-box" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" data-i="1">
      <input class="pin-box" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" data-i="2">
      <input class="pin-box" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" data-i="3">
      <input class="pin-box" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" data-i="4">
      <input class="pin-box" type="password" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="off" data-i="5">
    </div>
    <div class="line-wrap" id="line-wrap" style="display:none!important">
      <div class="divider">หรือ</div>
      <button class="line-btn" id="line-btn">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 5.92 2 10.76c0 3.66 2.44 6.86 6.12 8.61-.27 1-.96 3.65-.96 3.65s-.04.18.09.25c.14.07.29-.01.29-.01l4.25-2.81c.68.09 1.38.14 2.11.14 5.52 0 10-3.92 10-8.76C22 5.92 17.52 2 12 2z"/></svg>
        เข้าสู่ระบบด้วย LINE
      </button>
    </div>
    <button class="btn-login" id="login-btn" disabled>เข้าสู่ระบบ</button>
    <div class="err-msg" id="err-msg"></div>
  </div>
  <div class="footer">AssetSys v1.0 · IT Department</div>
</div>
<script src="js/config.js"></script>
<script src="js/theme.js"></script>
<script src="js/api.js"></script>
<script>
Theme.renderBtn(document.getElementById('theme-btn'));
if(API.isLoggedIn())window.location.replace('index.html');
if(localStorage.getItem('assetsys_line_linked')==='1')document.getElementById('line-wrap').classList.add('show');

const empInput=document.getElementById('emp-id');
const boxes=Array.from(document.querySelectorAll('.pin-box'));
const loginBtn=document.getElementById('login-btn');
const errMsg=document.getElementById('err-msg');
let showPin=false;

function getPin(){return boxes.map(b=>b.value).join('');}
function updateState(){
  loginBtn.disabled=!(getPin().length===6&&empInput.value.trim());
  boxes.forEach(b=>b.classList.toggle('filled',b.value.length>0));
}

boxes.forEach((box,i)=>{
  box.addEventListener('input',e=>{
    const v=e.target.value.replace(/\D/g,'');
    box.value=v.slice(-1);
    if(v&&i<5)boxes[i+1].focus();
    updateState();
  });
  box.addEventListener('keydown',e=>{
    if(e.key==='Backspace'){if(!box.value&&i>0){boxes[i-1].focus();boxes[i-1].value='';} updateState();}
    if(e.key==='ArrowLeft'&&i>0)boxes[i-1].focus();
    if(e.key==='ArrowRight'&&i<5)boxes[i+1].focus();
    if(e.key==='Enter')tryLogin();
  });
  box.addEventListener('paste',e=>{
    e.preventDefault();
    const txt=(e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'').slice(0,6);
    txt.split('').forEach((ch,idx)=>{if(boxes[idx]){boxes[idx].value=ch;}});
    boxes[Math.min(txt.length,5)].focus();
    updateState();
  });
});

empInput.addEventListener('input',updateState);
empInput.addEventListener('keydown',e=>{if(e.key==='Enter')boxes[0].focus();});

document.getElementById('pin-show').addEventListener('click',function(){
  showPin=!showPin;
  boxes.forEach(b=>b.type=showPin?'text':'password');
  this.textContent=showPin?'ซ่อน':'แสดง';
});

function showError(msg){
  errMsg.textContent=msg;errMsg.classList.add('show');
  boxes.forEach(b=>{b.classList.add('shake');setTimeout(()=>b.classList.remove('shake'),400);});
  boxes.forEach(b=>b.value='');boxes[0].focus();updateState();
}

async function tryLogin(){
  const emp=empInput.value.trim(),pin=getPin();
  if(!emp||pin.length!==6)return;
  loginBtn.disabled=true;
  loginBtn.innerHTML='<span class="spin"></span>กำลังเข้าสู่ระบบ...';
  errMsg.classList.remove('show');
  try{
    const res=await API.login(emp,pin);
    if(!res||!res.token){showError('เข้าสู่ระบบไม่สำเร็จ กรุณาลองใหม่');return;}
    window.location.replace(res.must_change_pw?'change_pin.html':'records.html');
  }catch(err){showError(err.message||'เข้าสู่ระบบไม่สำเร็จ');}
  finally{loginBtn.innerHTML='เข้าสู่ระบบ';loginBtn.disabled=!(getPin().length===6&&empInput.value.trim());}
}
loginBtn.addEventListener('click',tryLogin);

document.getElementById('line-btn')?.addEventListener('click',()=>{
  if(!CONFIG.LINE_CHANNEL_ID){showError('LINE login ยังไม่ได้ตั้งค่า');return;}
  const state=Math.random().toString(36).substr(2);
  const cb=encodeURIComponent(window.location.origin+'/line_callback.html');
  localStorage.setItem('assetsys_line_state',state);
  window.location.href=`https://access.line.me/oauth2/v2.1/authorize?response_type=code&client_id=${CONFIG.LINE_CHANNEL_ID}&redirect_uri=${cb}&state=${state}&scope=profile%20openid`;
});
</script>
</body>
</html>
