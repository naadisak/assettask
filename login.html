<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AssetSys — Login</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red-1:#ff2d2d;--red-2:#c00;--red-3:#7a0000;
  --bg:#0a0a0a;--surface:#141414;--surface2:#1e1e1e;--surface3:#252525;
  --text:#f0f0f0;--muted:#777;--border:#2a2a2a;
  --input-bg:#1e1e1e;--input-txt:#f0f0f0;--card-bg:#141414;
  --key-bg:#1e1e1e;--key-text:#f0f0f0;--dot-empty:#333;--radius:16px;
}
[data-theme="light"]{
  --bg:#f2f2f7;--surface:#ffffff;--surface2:#f8f8f8;--surface3:#efefef;
  --text:#111;--muted:#888;--border:#e0e0e0;
  --input-bg:#f8f8f8;--input-txt:#111;--card-bg:#fff;
  --key-bg:#fff;--key-text:#111;--dot-empty:#ccc;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'IBM Plex Sans Thai',sans-serif;overflow:hidden;transition:background .25s,color .25s}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(192,0,0,.28) 0%,transparent 70%);pointer-events:none;z-index:0}
[data-theme="light"] body::before{background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(192,0,0,.1) 0%,transparent 70%)}

/* ── Theme btn ── */
.theme-btn{position:fixed;top:14px;right:14px;z-index:200;width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .25s,border-color .25s}

.wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:1.5rem}

.logo{text-align:center;margin-bottom:1.75rem;animation:fadeDown .6s ease both}
.logo-icon{width:72px;height:72px;border-radius:22px;overflow:hidden;margin:0 auto .85rem;box-shadow:0 8px 30px rgba(192,0,0,.35)}
.logo-icon img{width:100%;height:100%;object-fit:cover;display:block}
.logo h1{font-size:1.45rem;font-weight:600;letter-spacing:-.5px}
.logo p{font-size:.72rem;color:var(--muted);margin-top:.2rem;letter-spacing:.8px}

.card{width:100%;max-width:360px;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:1.75rem;animation:fadeUp .6s .1s ease both;transition:background .25s,border-color .25s}

/* ── First-login notice ── */
.notice{background:rgba(192,0,0,.08);border:1px solid rgba(192,0,0,.2);border-radius:10px;padding:.65rem .9rem;font-size:.75rem;color:#e06060;margin-bottom:1.1rem;line-height:1.65;display:flex;gap:8px;align-items:flex-start}
[data-theme="light"] .notice{background:rgba(192,0,0,.06);color:#b03030}

.field{margin-bottom:1.1rem}
.field label{display:block;font-size:.72rem;font-weight:500;color:var(--muted);letter-spacing:.8px;margin-bottom:.4rem}
.field input{width:100%;background:var(--input-bg);border:1px solid var(--border);border-radius:10px;padding:.72rem 1rem;font-size:.92rem;color:var(--input-txt);font-family:inherit;outline:none;transition:border-color .2s,background .25s}
.field input:focus{border-color:var(--red-1);box-shadow:0 0 0 3px rgba(255,45,45,.1)}
.field input::placeholder{color:var(--dot-empty)}

.pin-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem}
.pin-head label{font-size:.72rem;font-weight:500;color:var(--muted);letter-spacing:.8px}
.pin-toggle{font-size:.7rem;color:var(--red-1);cursor:pointer;background:none;border:none;font-family:inherit;padding:0}

.pin-dots{display:flex;gap:10px;justify-content:center;margin-bottom:1.35rem}
.pin-dot{width:13px;height:13px;border-radius:50%;border:2px solid var(--dot-empty);transition:all .15s}
.pin-dot.filled{background:var(--red-1);border-color:var(--red-1);transform:scale(1.1)}
.pin-dot.error{border-color:#ff4444;animation:shake .4s ease}

.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.key{background:var(--key-bg);border:1px solid var(--border);border-radius:12px;padding:.88rem;font-size:1.2rem;font-weight:500;cursor:pointer;font-family:'IBM Plex Mono',monospace;color:var(--key-text);transition:all .1s,background .25s,border-color .25s;user-select:none;-webkit-tap-highlight-color:transparent}
.key:active{opacity:.65;transform:scale(.95)}
.key.del{font-size:.95rem;font-family:'IBM Plex Sans Thai',sans-serif}
.key.empty{background:transparent;border-color:transparent;pointer-events:none}

.btn-login{width:100%;padding:.85rem;margin-top:1.15rem;background:linear-gradient(135deg,var(--red-1),var(--red-2));border:none;border-radius:12px;color:#fff;font-size:1rem;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity .2s,transform .1s;letter-spacing:.3px}
.btn-login:active{transform:scale(.98)}
.btn-login:disabled{opacity:.35;pointer-events:none}

.err-msg{display:none;text-align:center;font-size:.8rem;color:#ff6060;margin-top:.7rem;padding:.5rem;background:rgba(255,60,60,.08);border-radius:8px}
.err-msg.show{display:block;animation:fadeIn .3s ease}
.spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}

@keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:none}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{margin-top:1.35rem;text-align:center;font-size:.68rem;color:var(--muted);animation:fadeIn .8s .4s ease both}
</style>
</head>
<body>

<button class="theme-btn" id="theme-btn" aria-label="Toggle theme"></button>

<div class="wrap">
  <div class="logo">
    <div class="logo-icon">
      <img src="https://i.ibb.co/xSpNYB3j/technology.png" alt="AssetSys">
    </div>
    <h1>AssetSys</h1>
    <p>PC UPGRADE TRACKING SYSTEM</p>
  </div>

  <div class="card">
    <div class="notice">
      <span>💡</span>
      <span><strong>เข้าใช้งานครั้งแรก?</strong><br>ใช้ <strong>รหัสพนักงาน</strong> เป็น PIN แรก ระบบจะบังคับเปลี่ยน PIN ใหม่ทันที</span>
    </div>

    <div class="field">
      <label>รหัสพนักงาน</label>
      <input type="text" id="emp-id" placeholder="เช่น admin001" autocomplete="username" spellcheck="false">
    </div>

    <div class="pin-head">
      <label>PIN 6 หลัก</label>
      <button class="pin-toggle" id="pin-toggle">แสดง</button>
    </div>
    <div class="pin-dots" id="pin-dots">
      <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
      <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
    </div>

    <div class="numpad">
      <button class="key" data-v="1">1</button><button class="key" data-v="2">2</button><button class="key" data-v="3">3</button>
      <button class="key" data-v="4">4</button><button class="key" data-v="5">5</button><button class="key" data-v="6">6</button>
      <button class="key" data-v="7">7</button><button class="key" data-v="8">8</button><button class="key" data-v="9">9</button>
      <button class="key empty"></button><button class="key" data-v="0">0</button>
      <button class="key del" id="del-btn">⌫</button>
    </div>

    <button class="btn-login" id="login-btn" disabled>เข้าสู่ระบบ</button>
    <div class="err-msg" id="err-msg"></div>
  </div>
  <div class="footer">AssetSys v1.0 · IT Department</div>
</div>

<script src="js/config.js"></script>
<script src="js/theme.js"></script>
<script src="js/api.js"></script>
<script>
Theme.renderBtn(document.getElementById('theme-btn'));
if (API.isLoggedIn()) window.location.href = 'index.html';

let pin='', showPin=false;
const MAX=6;
const empInput=document.getElementById('emp-id');
const dots=document.querySelectorAll('.pin-dot');
const loginBtn=document.getElementById('login-btn');
const errMsg=document.getElementById('err-msg');

function updateDots(){
  dots.forEach((d,i)=>{
    d.classList.toggle('filled', i<pin.length);
    if(showPin && i<pin.length){
      d.textContent=pin[i];
      d.style.cssText='width:22px;height:22px;font-size:.85rem;font-family:"IBM Plex Mono",monospace;font-weight:500';
    }else{d.textContent='';d.style.cssText='';}
  });
  loginBtn.disabled=!(pin.length===MAX && empInput.value.trim());
}

document.querySelector('.numpad').addEventListener('click',e=>{
  const b=e.target.closest('.key');
  if(b && b.dataset.v!==undefined && pin.length<MAX){pin+=b.dataset.v;updateDots();}
});
document.getElementById('del-btn').addEventListener('click',()=>{pin=pin.slice(0,-1);updateDots();});
document.addEventListener('keydown',e=>{
  if(document.activeElement===empInput)return;
  if(/^[0-9]$/.test(e.key)&&pin.length<MAX){pin+=e.key;updateDots();}
  if(e.key==='Backspace'){pin=pin.slice(0,-1);updateDots();}
  if(e.key==='Enter')tryLogin();
});
empInput.addEventListener('input',updateDots);
document.getElementById('pin-toggle').addEventListener('click',function(){
  showPin=!showPin;this.textContent=showPin?'ซ่อน':'แสดง';updateDots();
});

function showError(msg){
  errMsg.textContent=msg;errMsg.classList.add('show');
  dots.forEach(d=>{d.classList.add('error');setTimeout(()=>d.classList.remove('error'),500);});
  pin='';updateDots();
}

async function tryLogin(){
  const emp=empInput.value.trim();
  if(!emp||pin.length!==MAX)return;
  loginBtn.disabled=true;
  loginBtn.innerHTML='<span class="spin"></span>กำลังเข้าสู่ระบบ...';
  errMsg.classList.remove('show');
  try{
    const res=await API.login(emp,pin);
    window.location.href=res?.must_change_pw?'change_pin.html':'index.html';
  }catch(err){
    showError(err.message||'เข้าสู่ระบบไม่สำเร็จ');
    loginBtn.innerHTML='เข้าสู่ระบบ';loginBtn.disabled=false;
  }
}
loginBtn.addEventListener('click',tryLogin);
</script>
</body>
</html>
