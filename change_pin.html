<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AssetSys">
<meta name="theme-color" content="#c00000">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AssetSys — ตั้งค่า PIN ใหม่</title>
<link href="https://fonts.googleapis.com/css2?family=Bai+Jamjuree:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red-1:#ff2d2d;--red-2:#c00;--bg:#0a0a0a;--surface:#141414;--surface2:#1e1e1e;--surface3:#252525;--text:#f0f0f0;--muted:#666;--border:#2a2a2a;--card-bg:#141414;--input-bg:#1e1e1e;}
[data-theme="light"]{--bg:#f0f0f5;--surface:#fff;--surface2:#f5f5f5;--surface3:#ebebeb;--text:#111;--muted:#999;--border:#e0e0e0;--card-bg:#fff;--input-bg:#f5f5f5;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Bai Jamjuree',sans-serif;transition:background .25s,color .25s}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 90% 55% at 50% -5%,rgba(192,0,0,.28) 0%,transparent 65%);pointer-events:none;z-index:0}
[data-theme="light"] body::before{background:radial-gradient(ellipse 90% 55% at 50% -5%,rgba(192,0,0,.08) 0%,transparent 65%)}
.theme-btn{position:fixed;top:14px;right:14px;z-index:200;width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:1.25rem}
.mini-logo{display:flex;align-items:center;gap:8px;margin-bottom:1.1rem}
.mini-icon{width:34px;height:34px;border-radius:10px;overflow:hidden;box-shadow:0 4px 16px rgba(192,0,0,.3)}
.mini-icon img{width:100%;height:100%;object-fit:cover;display:block}
.mini-name{font-size:.95rem;font-weight:700}
.header{text-align:center;margin-bottom:1.25rem}
.badge{display:inline-flex;align-items:center;gap:5px;background:rgba(192,0,0,.1);border:1px solid rgba(192,0,0,.25);border-radius:20px;padding:.28rem .75rem;font-size:.68rem;font-weight:600;color:#ff7070;letter-spacing:.5px;margin-bottom:.6rem}
.header h2{font-size:1.15rem;font-weight:700}
.header p{font-size:.76rem;color:var(--muted);margin-top:.25rem;line-height:1.5}
.card{width:100%;max-width:380px;background:var(--card-bg);border:1px solid var(--border);border-radius:18px;padding:1.5rem;animation:fadeUp .45s ease both;transition:background .25s,border-color .25s}
.steps{display:flex;gap:8px;justify-content:center;margin-bottom:1.2rem}
.step-bar{height:4px;border-radius:2px;background:var(--border);transition:all .3s}
.w-active{width:40px;background:var(--red-1)}
.w-done{width:28px;background:var(--surface3)}
.w-idle{width:28px}
.step-label{text-align:center;font-size:.72rem;color:var(--muted);margin-bottom:1.1rem;font-weight:500}
.pin-section-title{font-size:.68rem;font-weight:600;color:var(--muted);letter-spacing:.6px;margin-bottom:.5rem;display:flex;align-items:center;justify-content:space-between}
.pin-show-btn{font-size:.68rem;color:var(--red-1);background:none;border:none;font-family:'Bai Jamjuree',sans-serif;cursor:pointer;padding:0;font-weight:500}
.pin-boxes{display:flex;gap:8px;justify-content:center;margin-bottom:.5rem}
.pin-box{width:44px;height:52px;border-radius:11px;border:1.5px solid var(--border);background:var(--input-bg);color:var(--text);font-size:1.35rem;font-family:'Bai Jamjuree',monospace;font-weight:700;text-align:center;outline:none;caret-color:transparent;transition:border-color .15s,transform .1s;-webkit-appearance:none}
.pin-box:focus{border-color:var(--red-1);box-shadow:0 0 0 3px rgba(255,45,45,.1);transform:scale(1.05)}
.pin-box.filled{border-color:var(--red-1)}
.pin-box.green{border-color:#22c55e !important;box-shadow:0 0 0 3px rgba(34,197,94,.12) !important}
.pin-box.shake{animation:shake .35s ease}
.match-msg{text-align:center;font-size:.72rem;height:16px;margin-bottom:.5rem}
.match-msg.ok{color:#4ade80}
.match-msg.fail{color:#f87171}
.rules{background:var(--surface2);border-radius:10px;padding:.75rem .9rem;margin:.85rem 0;font-size:.73rem;color:var(--muted);line-height:1.9;font-weight:500}
.rules div::before{content:'· ';color:var(--red-1)}
.btn-save{width:100%;padding:.82rem;background:linear-gradient(135deg,var(--red-1),var(--red-2));border:none;border-radius:12px;color:#fff;font-size:.92rem;font-weight:700;font-family:'Bai Jamjuree',sans-serif;cursor:pointer;transition:opacity .2s,transform .1s}
.btn-save:disabled{opacity:.35;pointer-events:none}
.btn-save:active{transform:scale(.98)}
.err-msg{display:none;text-align:center;font-size:.76rem;color:#f87171;margin-top:.65rem;padding:.45rem;background:rgba(248,113,113,.08);border-radius:8px}
.err-msg.show{display:block}
.spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
.success-overlay{display:none;position:fixed;inset:0;z-index:200;background:var(--bg);flex-direction:column;align-items:center;justify-content:center}
.success-overlay.show{display:flex;animation:fadeIn .3s ease}
.check-circle{width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,#22c55e,#16a34a);display:flex;align-items:center;justify-content:center;margin-bottom:1rem;animation:popIn .5s ease}
.check-circle svg{width:32px;height:32px;stroke:#fff;stroke-width:2.5;fill:none;stroke-linecap:round}
.success-overlay h3{font-size:1.05rem;font-weight:700;margin-bottom:.3rem}
.success-overlay p{font-size:.8rem;color:var(--muted)}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
</style>
</head>
<body>
<button class="theme-btn" id="theme-btn"></button>
<div class="wrap">
  <div class="mini-logo">
    <div class="mini-icon"><img src="https://i.ibb.co/xSpNYB3j/technology.png" alt=""></div>
    <span class="mini-name">AssetSys</span>
  </div>
  <div class="header">
    <div class="badge">🔐 ตั้งค่า PIN ครั้งแรก</div>
    <h2>กำหนด PIN ใหม่</h2>
    <p>ตั้ง PIN 6 หลักสำหรับเข้าระบบ<br>ใช้แทนรหัสพนักงาน</p>
  </div>
  <div class="card">
    <div class="steps">
      <div class="step-bar w-active" id="s1"></div>
      <div class="step-bar w-idle" id="s2"></div>
    </div>
    <div class="step-label" id="step-label">ขั้นที่ 1 — กรอก PIN ใหม่</div>
    <div id="sec1">
      <div class="pin-section-title">
        <span>PIN ใหม่</span>
        <button class="pin-show-btn" id="show-btn">แสดง</button>
      </div>
      <div class="pin-boxes" id="boxes1">
        <input class="pin-box" type="password" maxlength="1" inputmode="numeric" autocomplete="off">
        <input class="pin-box" type="password" maxlength="1" inputmode="numeric" autocomplete="off">
        <input class="pin-box" type="password" maxlength="1" inputmode="numeric" autocomplete="off">
        <input class="pin-box" type="password" maxlength="1" inputmode="numeric" autocomplete="off">
        <input class="pin-box" type="password" maxlength="1" inputmode="numeric" autocomplete="off">
        <input class="pin-box" type="password" maxlength="1" inputmode="numeric" autocomplete="off">
      </div>
    </div>
    <div id="sec2" style="display:none">
      <div class="pin-section-title" style="margin-top:.5rem"><span>ยืนยัน PIN อีกครั้ง</span></div>
      <div class="pin-boxes" id="boxes2">
        <input class="pin-box" type="password" maxlength="1" inputmode="numeric" autocomplete="off">
        <input class="pin-box" type="password" maxlength="1" inputmode="numeric" autocomplete="off">
        <input class="pin-box" type="password" maxlength="1" inputmode="numeric" autocomplete="off">
        <input class="pin-box" type="password" maxlength="1" inputmode="numeric" autocomplete="off">
        <input class="pin-box" type="password" maxlength="1" inputmode="numeric" autocomplete="off">
        <input class="pin-box" type="password" maxlength="1" inputmode="numeric" autocomplete="off">
      </div>
      <div class="match-msg" id="match-msg"></div>
    </div>
    <div class="rules">
      <div>ตัวเลขเท่านั้น 6 หลัก</div>
      <div>ห้ามใช้รหัสพนักงานซ้ำ</div>
      <div>จำ PIN ไว้ — ระบบไม่มี reset</div>
    </div>
    <button class="btn-save" id="save-btn" disabled>ถัดไป →</button>
    <div class="err-msg" id="err-msg"></div>
  </div>
</div>
<div class="success-overlay" id="success">
  <div class="check-circle"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
  <h3>ตั้งค่า PIN สำเร็จ!</h3>
  <p>กำลังเข้าสู่ระบบ...</p>
</div>
<script src="js/config.js"></script>
<script src="js/theme.js"></script>
<script src="js/api.js"></script>
<script>
Theme.renderBtn(document.getElementById('theme-btn'));
if(!API.isLoggedIn())window.location.replace('login.html');
let step=1,showPin=false;
const b1=Array.from(document.querySelectorAll('#boxes1 .pin-box'));
const b2=Array.from(document.querySelectorAll('#boxes2 .pin-box'));
const saveBtn=document.getElementById('save-btn');
const errMsg=document.getElementById('err-msg');
const matchMsg=document.getElementById('match-msg');
function getPin(arr){return arr.map(b=>b.value).join('');}
function initBoxes(arr,onChange){
  arr.forEach((box,i)=>{
    box.addEventListener('input',e=>{
      const v=e.target.value.replace(/\D/g,'');box.value=v.slice(-1);
      box.classList.toggle('filled',!!box.value);
      if(v&&i<arr.length-1)arr[i+1].focus();onChange();
    });
    box.addEventListener('keydown',e=>{
      if(e.key==='Backspace'){if(!box.value&&i>0){arr[i-1].focus();arr[i-1].value='';arr[i-1].classList.remove('filled');}onChange();}
      if(e.key==='Enter')saveBtn.click();
    });
    box.addEventListener('paste',e=>{
      e.preventDefault();
      const txt=(e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'').slice(0,6);
      txt.split('').forEach((ch,idx)=>{if(arr[idx]){arr[idx].value=ch;arr[idx].classList.toggle('filled',!!ch);}});
      arr[Math.min(txt.length,arr.length-1)].focus();onChange();
    });
  });
}
function chk1(){saveBtn.disabled=getPin(b1).length<6;}
function chk2(){
  const p1=getPin(b1),p2=getPin(b2);
  if(p2.length===6){const ok=p1===p2;matchMsg.textContent=ok?'✓ PIN ตรงกัน':'✗ PIN ไม่ตรงกัน';matchMsg.className='match-msg '+(ok?'ok':'fail');b2.forEach(b=>b.classList.toggle('green',ok));saveBtn.disabled=!ok;}
  else{matchMsg.textContent='';matchMsg.className='match-msg';b2.forEach(b=>b.classList.remove('green'));saveBtn.disabled=true;}
}
initBoxes(b1,chk1);initBoxes(b2,chk2);
document.getElementById('show-btn').addEventListener('click',function(){
  showPin=!showPin;const t=showPin?'text':'password';
  [...b1,...b2].forEach(b=>b.type=t);this.textContent=showPin?'ซ่อน':'แสดง';
});
function goStep2(){
  if(/^(.)\1{5}$/.test(getPin(b1))){showError('ห้ามใช้ตัวเลขซ้ำกัน 6 ตัว');return;}
  step=2;document.getElementById('sec2').style.display='';document.getElementById('sec1').style.opacity='.45';
  document.getElementById('s1').className='step-bar w-done';document.getElementById('s2').className='step-bar w-active';
  document.getElementById('step-label').textContent='ขั้นที่ 2 — ยืนยัน PIN';
  saveBtn.textContent='บันทึก PIN';saveBtn.disabled=true;setTimeout(()=>b2[0].focus(),100);
}
function showError(msg){
  errMsg.textContent=msg;errMsg.classList.add('show');
  const arr=step===1?b1:b2;
  arr.forEach(b=>{b.classList.add('shake');setTimeout(()=>b.classList.remove('shake'),400);});
  (step===1?b1:b2).forEach(b=>{b.value='';b.classList.remove('filled','green');});
  (step===2?b2[0]:b1[0]).focus();
}
saveBtn.addEventListener('click',async()=>{
  if(step===1){goStep2();return;}
  saveBtn.disabled=true;saveBtn.innerHTML='<span class="spin"></span>กำลังบันทึก...';
  try{
    await API.changePin(getPin(b1));
    document.getElementById('success').classList.add('show');
    setTimeout(()=>window.location.replace('index.html'),1800);
  }catch(err){showError(err.message||'บันทึกไม่สำเร็จ');saveBtn.innerHTML='บันทึก PIN';saveBtn.disabled=false;}
});
</script>
</body>
</html>
