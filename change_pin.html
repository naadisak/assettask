<!DOCTYPE html>
<html lang="th" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AssetSys — ตั้งค่า PIN ใหม่</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red-1:#ff2d2d;--red-2:#c00;--red-3:#7a0000;
  --bg:#0a0a0a;--surface:#141414;--surface2:#1e1e1e;--surface3:#252525;
  --text:#f0f0f0;--muted:#777;--border:#2a2a2a;
  --input-bg:#1e1e1e;--card-bg:#141414;--key-bg:#1e1e1e;--key-text:#f0f0f0;--dot-empty:#333;--radius:16px;
}
[data-theme="light"]{
  --bg:#f2f2f7;--surface:#fff;--surface2:#f8f8f8;--surface3:#efefef;
  --text:#111;--muted:#888;--border:#e0e0e0;
  --input-bg:#f8f8f8;--card-bg:#fff;--key-bg:#fff;--key-text:#111;--dot-empty:#ccc;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'IBM Plex Sans Thai',sans-serif;overflow:hidden;transition:background .25s,color .25s}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(192,0,0,.25) 0%,transparent 70%);pointer-events:none;z-index:0}
[data-theme="light"] body::before{background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(192,0,0,.08) 0%,transparent 70%)}

.theme-btn{position:fixed;top:14px;right:14px;z-index:200;width:38px;height:38px;border-radius:50%;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .25s,border-color .25s}

.wrap{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:1.25rem}

/* ── App icon small ── */
.mini-logo{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem}
.mini-icon{width:36px;height:36px;border-radius:11px;overflow:hidden;box-shadow:0 4px 16px rgba(192,0,0,.3);flex-shrink:0}
.mini-icon img{width:100%;height:100%;object-fit:cover;display:block}
.mini-name{font-size:1rem;font-weight:600;letter-spacing:-.3px}

.header{text-align:center;margin-bottom:1.35rem}
.badge{display:inline-flex;align-items:center;gap:6px;background:rgba(192,0,0,.12);border:1px solid rgba(192,0,0,.25);border-radius:20px;padding:.3rem .8rem;font-size:.7rem;font-weight:500;color:#ff7070;letter-spacing:.5px;margin-bottom:.7rem}
[data-theme="light"] .badge{color:#b03030}
.header h2{font-size:1.2rem;font-weight:600}
.header p{font-size:.78rem;color:var(--muted);margin-top:.3rem;line-height:1.5}

.card{width:100%;max-width:360px;background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;animation:fadeUp .5s .1s ease both;transition:background .25s,border-color .25s}

.steps{display:flex;gap:8px;justify-content:center;margin-bottom:1.4rem}
.step{width:28px;height:4px;border-radius:2px;background:var(--border);transition:background .3s,width .3s}
.step.active{background:var(--red-1);width:42px}
.step.done{background:var(--surface3)}
.step-label{text-align:center;font-size:.73rem;color:var(--muted);margin-bottom:1.1rem;letter-spacing:.3px}

.pin-section{margin-bottom:1.1rem}
.pin-title{font-size:.7rem;font-weight:500;color:var(--muted);letter-spacing:.8px;margin-bottom:.5rem}
.pin-dots{display:flex;gap:10px;justify-content:center;margin-bottom:.4rem}
.pin-dot{width:12px;height:12px;border-radius:50%;border:2px solid var(--dot-empty);transition:all .15s}
.pin-dot.filled{background:var(--red-1);border-color:var(--red-1);transform:scale(1.1)}
.pin-dot.confirm-filled{background:#4ade80;border-color:#4ade80;transform:scale(1.1)}
.pin-dot.match{background:#4ade80;border-color:#4ade80}
.pin-dot.mismatch{background:#f87171;border-color:#f87171;animation:shake .4s ease}
.pin-dot.error{border-color:#ff4444;animation:shake .4s ease}

.pin-match-msg{text-align:center;font-size:.72rem;height:15px;transition:all .2s}
.pin-match-msg.ok{color:#4ade80}
.pin-match-msg.fail{color:#f87171}

.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-top:1.1rem}
.key{background:var(--key-bg);border:1px solid var(--border);border-radius:12px;padding:.82rem;font-size:1.15rem;font-weight:500;cursor:pointer;font-family:'IBM Plex Mono',monospace;color:var(--key-text);transition:all .1s,background .25s;user-select:none;-webkit-tap-highlight-color:transparent}
.key:active{opacity:.65;transform:scale(.95)}
.key.del{font-size:.9rem;font-family:'IBM Plex Sans Thai',sans-serif}
.key.empty{background:transparent;border-color:transparent;pointer-events:none}

.rules{background:var(--surface2);border-radius:10px;padding:.8rem 1rem;margin-bottom:1.1rem;font-size:.74rem;color:var(--muted);line-height:1.9;transition:background .25s}
.rules div::before{content:'· ';color:var(--red-1)}

.btn-save{width:100%;padding:.82rem;margin-top:1.1rem;background:linear-gradient(135deg,var(--red-1),var(--red-2));border:none;border-radius:12px;color:#fff;font-size:.95rem;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity .2s,transform .1s}
.btn-save:disabled{opacity:.35;pointer-events:none}
.btn-save:active{transform:scale(.98)}
.err-msg{display:none;text-align:center;font-size:.78rem;color:#f87171;margin-top:.7rem;padding:.45rem;background:rgba(255,60,60,.08);border-radius:8px}
.err-msg.show{display:block;animation:fadeIn .3s ease}
.spin{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}

.success-overlay{display:none;position:fixed;inset:0;z-index:100;background:var(--bg);flex-direction:column;align-items:center;justify-content:center;animation:fadeIn .4s ease}
.success-overlay.show{display:flex}
.check-circle{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,#22c55e,#16a34a);display:flex;align-items:center;justify-content:center;margin-bottom:1.25rem;animation:popIn .5s ease}
.check-circle svg{width:34px;height:34px;stroke:#fff;stroke-width:2.5;fill:none;stroke-linecap:round;stroke-linejoin:round}
.success-overlay h3{font-size:1.1rem;font-weight:600;margin-bottom:.4rem}
.success-overlay p{font-size:.82rem;color:var(--muted)}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes popIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
</style>
</head>
<body>
<button class="theme-btn" id="theme-btn" aria-label="Toggle theme"></button>

<div class="wrap">
  <div class="mini-logo">
    <div class="mini-icon"><img src="https://i.ibb.co/xSpNYB3j/technology.png" alt="AssetSys"></div>
    <span class="mini-name">AssetSys</span>
  </div>

  <div class="header">
    <div class="badge">🔐 ตั้งค่า PIN ครั้งแรก</div>
    <h2>กำหนด PIN ใหม่</h2>
    <p>ตั้ง PIN 6 หลักสำหรับเข้าระบบ<br>ใช้แทนรหัสพนักงาน</p>
  </div>

  <div class="card">
    <div class="steps">
      <div class="step active" id="s1"></div>
      <div class="step" id="s2"></div>
    </div>
    <div class="step-label" id="step-label">ขั้นที่ 1 — กรอก PIN ใหม่</div>

    <div class="pin-section" id="sec-pin1">
      <div class="pin-title">PIN ใหม่</div>
      <div class="pin-dots" id="dots1">
        <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
        <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
      </div>
    </div>

    <div class="pin-section" id="sec-pin2" style="display:none">
      <div class="pin-title">ยืนยัน PIN อีกครั้ง</div>
      <div class="pin-dots" id="dots2">
        <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
        <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
      </div>
      <div class="pin-match-msg" id="match-msg"></div>
    </div>

    <div class="rules">
      <div>ตัวเลขเท่านั้น 6 หลัก</div>
      <div>ห้ามใช้รหัสพนักงานซ้ำ</div>
      <div>จำ PIN ไว้ — ระบบไม่มี reset</div>
    </div>

    <div class="numpad">
      <button class="key" data-v="1">1</button><button class="key" data-v="2">2</button><button class="key" data-v="3">3</button>
      <button class="key" data-v="4">4</button><button class="key" data-v="5">5</button><button class="key" data-v="6">6</button>
      <button class="key" data-v="7">7</button><button class="key" data-v="8">8</button><button class="key" data-v="9">9</button>
      <button class="key empty"></button><button class="key" data-v="0">0</button>
      <button class="key del" id="del-btn">⌫</button>
    </div>

    <button class="btn-save" id="save-btn" disabled>ถัดไป →</button>
    <div class="err-msg" id="err-msg"></div>
  </div>
</div>

<div class="success-overlay" id="success">
  <div class="check-circle"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>
  <h3>ตั้งค่า PIN สำเร็จ!</h3>
  <p>กำลังเข้าสู่ระบบ...</p>
</div>

<script src="js/config.js"></script>
<script src="js/theme.js"></script>
<script src="js/api.js"></script>
<script>
Theme.renderBtn(document.getElementById('theme-btn'));
if(!API.isLoggedIn()) window.location.href='login.html';

let pin1='', pin2='', step=1;
const dots1=document.querySelectorAll('#dots1 .pin-dot');
const dots2=document.querySelectorAll('#dots2 .pin-dot');
const saveBtn=document.getElementById('save-btn');
const errMsg=document.getElementById('err-msg');
const matchMsg=document.getElementById('match-msg');

function updateDots(arr, pin, mode='normal'){
  arr.forEach((d,i)=>{
    const f=i<pin.length;
    d.classList.remove('filled','confirm-filled','match','mismatch');
    if(!f)return;
    if(mode==='confirm'&&pin1.length===6&&pin.length===6){
      d.classList.add(pin1===pin2?'match':'mismatch');
    }else{
      d.classList.add(mode==='confirm'?'confirm-filled':'filled');
    }
  });
}

function refresh(){
  if(step===1){
    updateDots(dots1,pin1);
    saveBtn.textContent=pin1.length===6?'ถัดไป →':'ถัดไป →';
    saveBtn.disabled=pin1.length<6;
  }else{
    updateDots(dots2,pin2,'confirm');
    if(pin2.length===6){
      const ok=pin1===pin2;
      matchMsg.textContent=ok?'✓ PIN ตรงกัน':'✗ PIN ไม่ตรงกัน';
      matchMsg.className='pin-match-msg '+(ok?'ok':'fail');
      saveBtn.disabled=!ok;
    }else{
      matchMsg.textContent='';matchMsg.className='pin-match-msg';
      saveBtn.disabled=true;
    }
  }
}

function goStep2(){
  if(/^(.)\1{5}$/.test(pin1)){showError('ห้ามใช้ตัวเลขซ้ำกัน 6 ตัว');return;}
  step=2;
  document.getElementById('sec-pin2').style.display='';
  document.getElementById('sec-pin1').style.opacity='.4';
  document.getElementById('s1').classList.replace('active','done');
  document.getElementById('s2').classList.add('active');
  document.getElementById('step-label').textContent='ขั้นที่ 2 — ยืนยัน PIN';
  saveBtn.textContent='บันทึก PIN'; saveBtn.disabled=true;
}

function showError(msg){
  errMsg.textContent=msg;errMsg.classList.add('show');
  const target=step===1?dots1:dots2;
  target.forEach(d=>{d.classList.add('error');setTimeout(()=>d.classList.remove('error'),500);});
  if(step===2)pin2=''; else pin1='';
  refresh();
}

document.querySelector('.numpad').addEventListener('click',e=>{
  const b=e.target.closest('.key');
  if(!b||b.dataset.v===undefined)return;
  errMsg.classList.remove('show');
  if(step===1&&pin1.length<6){pin1+=b.dataset.v;refresh();}
  else if(step===2&&pin2.length<6){pin2+=b.dataset.v;refresh();}
});

document.getElementById('del-btn').addEventListener('click',()=>{
  if(step===1)pin1=pin1.slice(0,-1);else pin2=pin2.slice(0,-1);refresh();
});

saveBtn.addEventListener('click',async()=>{
  if(step===1){goStep2();return;}
  saveBtn.disabled=true;
  saveBtn.innerHTML='<span class="spin"></span>กำลังบันทึก...';
  try{
    await API.changePin(pin1);
    document.getElementById('success').classList.add('show');
    setTimeout(()=>window.location.href='index.html',1800);
  }catch(err){
    showError(err.message||'บันทึกไม่สำเร็จ');
    saveBtn.innerHTML='บันทึก PIN';saveBtn.disabled=false;
  }
});
refresh();
</script>
</body>
</html>
